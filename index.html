<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trick-or-Treat Map — Central Coast, NSW</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mystery+Quest&family=Baloo+2:wght@600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="title-block">
      <h1>
        <svg class="pumpkin-icon pumpkin-icon-header" viewBox="0 0 128 128" aria-hidden="true">
          <defs>
            <filter id="pumpkinGlow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <g filter="url(#pumpkinGlow)">
            <path d="M64 18 C58 10 60 4 68 4 C76 6 74 16 70 24"
                  fill="none" stroke="#6ae46a" stroke-width="6" stroke-linecap="round"/>

            <rect x="58" y="18" width="12" height="16" rx="3" fill="#68d95c"/>

            <ellipse cx="40" cy="72" rx="22" ry="32" fill="#ff8a00"/>
            <ellipse cx="64" cy="68" rx="28" ry="38" fill="#ff9b1f"/>
            <ellipse cx="88" cy="72" rx="22" ry="32" fill="#ff8a00"/>

            <path d="M30 60 L42 76 L20 76 Z" fill="#1a1208"/>
            <path d="M98 60 L86 76 L108 76 Z" fill="#1a1208"/>
            <path d="M64 74 L56 88 L72 88 Z" fill="#1a1208"/>

            <path d="M38 96
                     Q64 112 90 96"
                  stroke="#1a1208"
                  stroke-width="7"
                  fill="none"
                  stroke-linecap="round"/>
          </g>
        </svg>
        <span class="title-text">Trick-or-Treat Map</span>
      </h1>
      <p class="subtitle">Central Coast, NSW</p>
    </div>
    <div class="legend-block">
      <p class="legend-label">Allergen Legend</p>
      <div id="allergen-legend" class="allergen-legend" aria-label="Allergen badge legend"></div>
    </div>
    <div class="header-actions">
      <span id="house-count" class="house-count">Loading houses…</span>
      <a class="register-link" href="https://rcdnplx5.paperform.co/" target="_blank" rel="noopener">
        Register your house
      </a>
    </div>
  </header>

  <main>
    <div id="map"></div>
    <div class="purple-tint" aria-hidden="true"></div>
    <div id="empty-state" class="empty-state hidden">
      <p><strong>No houses registered yet.</strong></p>
      <p>Be the first on the map — <a href="https://rcdnplx5.paperform.co/" target="_blank" rel="noopener">register your house</a>.</p>
    </div>
  </main>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
